
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestãoFisio - Gestão de Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Visual Error Debugger -->
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML = '<div style="background:#ffdddd; color:#990000; padding:20px; font-family:monospace; margin:20px; border:1px solid #ff0000; border-radius:5px; white-space:pre-wrap;">' + 
          '<h2>🔴 Erro Crítico (Crash)</h2>' +
          '<b>Mensagem:</b> ' + event.message + '<br/><br/>' +
          '<b>Arquivo:</b> ' + event.filename + ':' + event.lineno + ':' + event.colno + '<br/><br/>' +
          '<b>Stack:</b> ' + (event.error && event.error.stack ? event.error.stack : 'N/A') +
          '</div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="background:#ffeeee; color:#aa0000; padding:20px; font-family:monospace; margin:20px; border:1px solid #cc0000; border-radius:5px; white-space:pre-wrap;">' + 
          '<h2>🟠 Promessa Não Tratada</h2>' +
          '<b>Motivo:</b> ' + String(event.reason) + '<br/><br/>' +
          '<b>Stack:</b> ' + (event.reason && event.reason.stack ? event.reason.stack : 'N/A') +
          '</div>';
      });
    </script>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
